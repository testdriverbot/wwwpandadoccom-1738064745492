version: 4.1.43
steps:
  - prompt: Focus the browser window.
    commands:
      - command: focus-application
        name: Google Chrome
  - prompt: Click on "Start free 14-day trial."
    commands:
      - command: hover-text
        text: Start free 14-day trial
        description: button to start the free trial on the webpage
        action: click
  - prompt: >-
      Assert that the trial sign-up page or overlay is displayed.  # Use the
      content of the file from the environment
    commands:
      - command: assert
        expect: Start a free 14-day trial is visible on the page
