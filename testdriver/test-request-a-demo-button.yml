version: 4.1.43
steps:
  - prompt: Focus the browser window.
    commands:
      - command: focus-application
        name: Google Chrome
  - prompt: Click on "Request a demo."
    commands:
      - command: hover-text
        text: Request a demo
        description: button to request a demo on the webpage
        action: click
  - prompt: >-
      Assert that the demo request form or page is displayed.  # Use the content
      of the file from the environment
    commands:
      - command: assert
        expect: >-
          the demo request form is displayed with "Schedule your personalized
          1:1 demo"
