version: 4.1.43
steps:
  - prompt: Focus the browser window.
    commands:
      - command: focus-application
        name: Google Chrome
  - prompt: Click on "Contact sales."
    commands:
      - command: hover-text
        text: Contact sales
        description: contact sales link in the header
        action: click
  - prompt: >-
      Assert that the contact page or contact form is displayed.  # Use the
      content of the file from the environment
    commands:
      - command: assert
        expect: the contact page is displayed with "Talk to a sales specialist"
