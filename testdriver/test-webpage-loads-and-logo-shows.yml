version: 4.1.43
steps:
  - prompt: Focus the browser window.
    commands:
      - command: focus-application
        name: Google Chrome
  - prompt: >-
      Assert that the PandaDoc logo is visible on the webpage.  # Use the
      content of the file from the environment
    commands:
      - command: assert
        expect: the PandaDoc logo is visible on the webpage
