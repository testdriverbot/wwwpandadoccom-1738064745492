version: 4.1.43
steps:
  - prompt: Focus the browser window.
    commands:
      - command: focus-application
        name: Google Chrome
  - prompt: Click on "Help center."
    commands:
      - command: hover-text
        text: Help center
        description: link in the top navigation bar
        action: click
  - prompt: >-
      Assert that the help center page is displayed.  # Use the content of the
      file from the environment
    commands:
      - command: assert
        expect: the help center page is displayed
